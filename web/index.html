<!DOCTYPE html>
<html>
<head>
    <title>ASCII Aquarium</title>
    <style>
        body { background-color: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        /* Важно: monospace сохраняет структуру ASCII-арта */
        #aquarium { 
            font-family: 'Courier New', monospace; 
            font-size: 14px; 
            line-height: 1.1; 
            background: #000;
            padding: 20px;
            border: 2px solid #222;
        }
    </style>
</head>
<body>
    <pre id="aquarium">Loading aquarium...</pre>
    <button onclick="addFish1()" style="padding: 10px; cursor: pointer;">fish1</button>
    <button onclick="addFish2()" style="padding: 10px; cursor: pointer;">fish2</button>
    <button onclick="addFish3()" style="padding: 10px; cursor: pointer;">fish3</button>
    <button onclick="addFish4()" style="padding: 10px; cursor: pointer;">fish4</button>
    <button onclick="addFish5()" style="padding: 10px; cursor: pointer;">fish5</button>
    
    

    <script>
    async function addFish1() {
        await fetch('http://localhost:8080/add_fish1');
        console.log("Fish added!");
    }
    async function addFish2() {
        await fetch('http://localhost:8080/add_fish2');
        console.log("Fish added!");
    }
    async function addFish3() {
        await fetch('http://localhost:8080/add_fish3');
        console.log("Fish added!");
    }
    async function addFish4() {
        await fetch('http://localhost:8080/add_fish4');
        console.log("Fish added!");
    }
    async function addFish5() {
        await fetch('http://localhost:8080/add_fish5');
        console.log("Fish added!");
    }
    </script>


    <script>
        async function updateAquarium() {
            try {
                // Стучимся к нашему C++ серверу
                const response = await fetch('http://localhost:8080/get_frame');
                const html = await response.text();
                document.getElementById('aquarium').innerHTML = html;
            } catch (err) {
                console.error("Server is not responding");
            }
        }
        // Обновляем кадр 10 раз в секунду
        setInterval(updateAquarium, 100);
    </script>
</body>
</html>
